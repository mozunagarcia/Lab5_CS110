<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYT Most Popular</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
        <div id="filter-panel">
            <h2>Filter</h2>

            <div class="filter-group">
                <strong>Sort By:</strong>
                <label><input type="radio" name="sortBy" value="viewed"> Most Viewed</label>
                <label><input type="radio" name="sortBy" value="shared" checked> Most Shared</label>
                <label><input type="radio" name="sortBy" value="emailed"> Most Emailed</label>
            </div>

            <div class="filter-group">
              <strong>Time Frame:</strong>
                <label><input type="radio" name="period" value="1"> Day</label>
                <label><input type="radio" name="period" value="7"> Week</label>
                <label><input type="radio" name="period" value="30" checked> Month</label>
            </div>
        </div>

        <!-- articles go here -->
        <div id="articles-container">
            <p id="loading">Loading articles...</p>
        </div>
  </div>
    <script src="config.js"></script>
    <script src="main.js"></script>
</body>
</html>
